<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="在一颗持续存在的地球上，发现最近 30 天来自真实城市与远程团队的工作机会。" />
    <meta name="theme-color" content="#f0f0ec" />
    <title>OpenWork｜世界各地正在招什么</title>
    <link rel="icon" href="openwork-mark.png" type="image/png" />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="node_modules/globe.gl/dist/globe.gl.min.js"></script>
    <script defer src="node_modules/three/build/three.min.js"></script>
    <script defer src="data.js"></script>
    <script defer src="data-month.js"></script>
    <script defer src="data-remote.js"></script>
    <script defer src="data-locations.js"></script>
    <script defer src="explore.js"></script>
  </head>
  <body class="app-page is-landing">
    <a class="skip-link explore-reveal" href="#job-search">跳到岗位搜索</a>

    <main class="app-shell">
      <header class="app-header">
        <a class="wordmark" id="home-link" href="index.html" aria-label="返回首页">
          <span class="wordmark-mark" aria-hidden="true"><img src="openwork-mark.png" alt="" /></span>
          <span>OpenWork</span>
        </a>
        <div class="header-status" aria-live="polite">
          <span class="quiet-window landing-reveal">过去 30 天</span>
          <span class="source-window explore-reveal">
            <i class="live-dot" aria-hidden="true"></i>
            <span>公开帖子 · 过去 30 天</span>
          </span>
        </div>
      </header>

      <section class="landing-copy landing-reveal" aria-labelledby="landing-title">
        <p class="landing-kicker">全球远程工作地图</p>
        <h1 id="landing-title">工作在远方，<br />你不必远行。</h1>
        <p class="landing-lead">寻找最近 30 天，来自真实城市与远程团队的工作机会。</p>
        <button class="primary-entry" id="start-explore" type="button">
          <span>开始查看</span>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h13M14 7l5 5-5 5" /></svg>
        </button>
      </section>

      <section class="earth-stage shared-earth" id="earth-stage" aria-label="全球工作地图">
        <div id="work-globe" aria-hidden="true"></div>
        <div class="landing-orbit-note landing-reveal" aria-hidden="true"><span></span> 每个城市点，都有明确的位置依据</div>
        <div class="globe-empty" id="globe-empty" hidden>
          <p>地球暂时没有载入，但仍可在下方搜索岗位。</p>
        </div>
      </section>

      <button class="reset-view explore-reveal" id="reset-view" type="button" aria-label="重置地球视角">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 7v5h-5M4 17v-5h5" /><path d="M6.2 8.5A7 7 0 0 1 18.8 7L20 12M4 12l1.2 5A7 7 0 0 0 18 15.5" /></svg>
      </button>

      <aside class="job-card" id="job-card" hidden aria-live="polite">
        <button class="card-switch card-switch-prev" id="card-prev" type="button" aria-label="上一个岗位">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m14.5 6-6 6 6 6" /></svg>
        </button>
        <button class="card-switch card-switch-next" id="card-next" type="button" aria-label="下一个岗位">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9.5 6 6 6-6 6" /></svg>
        </button>
        <button class="job-card-close" id="job-card-close" type="button" aria-label="关闭岗位详情">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 6 12 12M18 6 6 18" /></svg>
        </button>
        <span class="job-card-source">来源 · <b id="card-source">X</b></span>
        <div class="job-card-topline">
          <span id="card-posted"></span>
          <span class="evidence-pill" id="card-evidence"></span>
          <span class="card-position" id="card-position"></span>
        </div>
        <p class="job-card-company" id="card-company"></p>
        <h1 id="card-title"></h1>
        <div class="job-card-facts">
          <span><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s7-5 7-12a7 7 0 1 0-14 0c0 7 7 12 7 12Z" /><circle cx="12" cy="9" r="2" /></svg><b id="card-location"></b></span>
          <span><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path d="M9 9.5c0-1 1-2 3-2s3 1 3 2-1 1.8-3 2-3 1-3 2 1 2 3 2 3-1 3-2M12 5v14" /></svg><b id="card-salary"></b></span>
        </div>
        <p class="job-card-summary" id="card-summary"></p>
        <div class="job-card-tags" id="card-tags"></div>
        <div class="job-card-actions">
          <a class="job-action job-action-primary" id="card-apply" href="#" target="_blank" rel="noreferrer noopener">
            <span>立即投递</span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h13M14 7l5 5-5 5" /></svg>
          </a>
          <button class="job-action job-action-secondary" id="card-details" type="button" aria-expanded="false">
            <span>查看详情</span>
          </button>
        </div>
        <p class="job-action-feedback" id="card-action-feedback" role="status" hidden></p>
      </aside>

      <section class="search-zone explore-reveal" aria-label="搜索工作">
        <div class="result-sheet" id="result-sheet" hidden>
          <div class="result-sheet-head">
            <span id="result-label">本月值得看看</span>
            <button type="button" id="close-results">收起</button>
          </div>
          <div class="result-list" id="result-list"></div>
          <p class="result-empty" id="result-empty" hidden>没有找到匹配的岗位，换个关键词试试。</p>
        </div>

        <form class="search-dock" id="search-form" role="search">
          <label class="search-input-wrap" for="job-search">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6" /><path d="m16 16 4 4" /></svg>
            <input id="job-search" type="search" autocomplete="off" placeholder="搜索职位、公司或城市" aria-controls="result-sheet" />
            <span class="search-count" id="search-count" aria-live="polite"></span>
          </label>
          <div class="category-filter" id="category-filter">
            <button class="category-current category-toggle" id="category-toggle" type="button" aria-haspopup="listbox" aria-controls="category-menu" aria-expanded="false">
              <i aria-hidden="true"></i>
              <span>全部类型</span>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 15 6-6 6 6" /></svg>
            </button>
            <div class="category-menu" id="category-menu" role="listbox" aria-label="工作类型" hidden></div>
          </div>
        </form>
      </section>

      <footer class="landing-footer landing-reveal">
        <span>公开招聘帖</span>
        <span class="footer-dot"></span>
        <span>X · Reddit · 领英 · 公开职位源</span>
      </footer>

      <div class="explore-loading" id="explore-loading" aria-live="polite">
        <span></span>
        <p>正在点亮工作</p>
      </div>
    </main>
  </body>
</html>
